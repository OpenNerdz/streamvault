name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-screenshots
          path: screenshots/*.png

  package:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            command: npm run build:linux
            artifact: release/*
          - os: macos-latest
            command: npm run build:mac
            artifact: release/*
          - os: windows-latest
            command: npm run build:win
            artifact: release/*
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: streamvault-${{ runner.os }}
          path: ${{ matrix.artifact }}
